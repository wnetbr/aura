<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rede Social P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; }
        #chat { height: 300px; overflow-y: auto; border: 1px solid #333; padding: 10px; margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg { background: #333; padding: 8px; border-radius: 8px; margin: 5px 0; width: fit-content; }
        .controls { display: grid; gap: 10px; }
        input, button { padding: 10px; border-radius: 5px; border: none; }
        button { cursor: pointer; background: #007bff; color: white; font-weight: bold; }
        .id-display { background: #2c2c2c; padding: 10px; margin-bottom: 15px; border-radius: 5px; font-family: monospace; color: #00ff00; }
    </style>
</head>
<body>

<div class="container">
    <h3>Sua Identidade:</h3>
    <div class="id-display" id="meu-id">Gerando ID...</div>

    <div class="controls">
        <input type="text" id="id-destino" placeholder="Cole o ID do outro celular aqui">
        <button onclick="conectar()">Conectar ao Amigo</button>
    </div>

    <hr>

    <div id="chat"></div>

    <div class="controls">
        <input type="text" id="texto" placeholder="Mensagem de texto...">
        <div style="display: flex; gap: 5px;">
            <button onclick="enviarTexto()">Enviar Texto</button>
            <label style="background:#444; padding:10px; border-radius:5px; cursor:pointer">
                📎 Arquivo/Foto <input type="file" id="arquivo" hidden onchange="enviarArquivo()">
            </label>
        </div>
        <button id="btnVoz" style="background:#28a745">🎤 Gravar e Enviar Voz</button>
    </div>
</div>

<script>
    let peer = new Peer(); // Cria a conexão
    let conn; // Armazena a conexão de dados

    // 1. Exibir meu ID para passar para o outro celular
    peer.on('open', (id) => {
        document.getElementById('meu-id').innerText = id;
    });

    // 2. Escutar quando alguém se conectar a mim
    peer.on('connection', (c) => {
        conn = c;
        configurarRecebimento();
    });

    // 3. Função para conectar ao outro celular
    function conectar() {
        const idDestino = document.getElementById('id-destino').value;
        conn = peer.connect(idDestino);
        configurarRecebimento();
    }

    function configurarRecebimento() {
        conn.on('open', () => {
            adicionarMensagem("Sistema", "Conectado com sucesso!");
            
            conn.on('data', (data) => {
                if (data.tipo === 'texto') adicionarMensagem("Amigo", data.msg);
                if (data.tipo === 'arquivo') receberArquivo(data);
                if (data.tipo === 'voz') receberAudio(data.blob);
            });
        });
    }

    // --- FUNÇÕES DE ENVIO ---

    function enviarTexto() {
        const msg = document.getElementById('texto').value;
        conn.send({ tipo: 'texto', msg: msg });
        adicionarMensagem("Eu", msg);
        document.getElementById('texto').value = "";
    }

    function enviarArquivo() {
        const file = document.getElementById('arquivo').files[0];
        const reader = new FileReader();
        reader.onload = () => {
            conn.send({
                tipo: 'arquivo',
                nome: file.name,
                mime: file.type,
                dados: reader.result
            });
            adicionarMensagem("Eu", "Arquivo enviado: " + file.name);
        };
        reader.readAsArrayBuffer(file);
    }

    // --- VOZ (AUDIO) ---
    let mediaRecorder;
    document.getElementById('btnVoz').onmousedown = async () => {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        let chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'audio/ogg; codecs=opus' });
            conn.send({ tipo: 'voz', blob: blob });
            adicionarMensagem("Eu", "Mensagem de voz enviada");
        };
        mediaRecorder.start();
        document.getElementById('btnVoz').innerText = "Gravando... Solte para enviar";
    };

    document.getElementById('btnVoz').onmouseup = () => {
        mediaRecorder.stop();
        document.getElementById('btnVoz').innerText = "🎤 Gravar e Enviar Voz";
    };

    // --- AUXILIARES ---

    function adicionarMensagem(autor, msg) {
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<strong>${autor}:</strong> ${msg}`;
        document.getElementById('chat').appendChild(div);
    }

    function receberArquivo(data) {
        const blob = new Blob([data.dados], { type: data.mime });
        const url = URL.createObjectURL(blob);
        adicionarMensagem("Amigo", `<a href="${url}" download="${data.nome}" style="color:cyan">Baixar Arquivo: ${data.nome}</a>`);
    }

    function receberAudio(blobData) {
        const blob = new Blob([blobData], { type: 'audio/ogg' });
        const url = URL.createObjectURL(blob);
        adicionarMensagem("Amigo", `<audio controls src="${url}"></audio>`);
    }
</script>

</body>
</html>
