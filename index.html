<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iMessage P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-gray: #8E8E93;
            --apple-bg: #F2F2F7;
            --apple-card: #FFFFFF;
            --apple-text: #000000;
            --apple-bubble-me: #007AFF;
            --apple-bubble-them: #E9E9EB;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --apple-bg: #000000;
                --apple-card: #1C1C1E;
                --apple-text: #FFFFFF;
                --apple-bubble-them: #262629;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            margin: 0;
            background-color: var(--apple-bg);
            color: var(--apple-text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Setup Screen */
        #setup-screen {
            position: fixed;
            inset: 0;
            background: var(--apple-bg);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        .apple-card {
            background: var(--apple-card);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 60px;
            margin-bottom: 20px;
            color: var(--apple-blue);
        }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
        p { color: var(--apple-gray); margin-bottom: 30px; }

        .id-box {
            background: var(--apple-bg);
            padding: 15px;
            border-radius: 12px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 5px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        #qrcode {
            margin: 20px auto;
            padding: 10px;
            background: white;
            border-radius: 10px;
            display: inline-block;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--apple-gray);
            background: var(--apple-bg);
            color: var(--apple-text);
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            text-align: center;
        }

        .apple-btn {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            background: var(--apple-blue);
            color: white;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .apple-btn:active { opacity: 0.7; }

        /* Chat Screen */
        #chat-screen {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        header {
            padding: 15px 20px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--apple-gray);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        @media (prefers-color-scheme: dark) {
            header { background: rgba(28,28,30,0.8); }
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #4CD964;
            display: inline-block;
            margin-right: 5px;
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 16px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word;
        }

        .message.me {
            align-self: flex-end;
            background: var(--apple-bubble-me);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.them {
            align-self: flex-start;
            background: var(--apple-bubble-them);
            color: var(--apple-text);
            border-bottom-left-radius: 4px;
        }

        .message img, .message video {
            max-width: 100%;
            border-radius: 12px;
            margin-top: 5px;
        }

        .message .file-link {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
            font-weight: 500;
        }

        /* Input Area */
        .input-area {
            padding: 10px 15px 30px 15px;
            background: var(--apple-bg);
            display: flex;
            align-items: flex-end;
            gap: 10px;
        }

        .input-container {
            flex: 1;
            background: var(--apple-card);
            border: 0.5px solid var(--apple-gray);
            border-radius: 25px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            min-height: 40px;
        }

        #message-input {
            flex: 1;
            border: none;
            background: transparent;
            color: var(--apple-text);
            font-size: 16px;
            padding: 8px 0;
            outline: none;
            max-height: 100px;
            overflow-y: auto;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--apple-blue);
            font-size: 22px;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn {
            background: var(--apple-blue);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 16px;
        }

        /* Recording Overlay */
        #recording-ui {
            display: none;
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            align-items: center;
            gap: 10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Setup Screen -->
    <div id="setup-screen">
        <div class="apple-card">
            <div class="logo"><i class="fab fa-apple"></i></div>
            <h1>iMessage P2P</h1>
            <p>Conecte-se de forma privada e segura.</p>
            
            <div id="my-id-container">
                <small style="color: var(--apple-gray)">Seu Código de Conexão</small>
                <div class="id-box" id="display-id" onclick="copyID()">----</div>
                <div id="qrcode"></div>
            </div>

            <div style="margin-top: 20px;">
                <input type="text" id="peer-id-input" placeholder="Digite o código de 4 dígitos">
                <button class="apple-btn" onclick="connectToPeer()">Conectar</button>
            </div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chat-screen">
        <header>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 40px; height: 40px; border-radius: 50%; background: var(--apple-gray); display: flex; align-items: center; justify-content: center; color: white;">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <div style="font-weight: 600;" id="chat-with">Conectando...</div>
                    <div style="font-size: 12px; color: var(--apple-gray);"><span class="status-dot"></span>Online</div>
                </div>
            </div>
            <button class="icon-btn" onclick="location.reload()"><i class="fas fa-phone"></i></button>
        </header>

        <div id="messages"></div>

        <div id="recording-ui">
            <i class="fas fa-microphone"></i> Gravando áudio...
        </div>

        <div class="input-area">
            <label class="icon-btn">
                <i class="fas fa-plus"></i>
                <input type="file" id="file-input" hidden onchange="sendFile()">
            </label>
            
            <div class="input-container">
                <input type="text" id="message-input" placeholder="iMessage" autocomplete="off">
                <button class="icon-btn" id="voice-btn"><i class="fas fa-microphone"></i></button>
            </div>

            <button class="icon-btn send-btn" onclick="sendMessage()"><i class="fas fa-arrow-up"></i></button>
        </div>
    </div>

    <script>
        let peer;
        let conn;
        let myId = "";
        let mediaRecorder;
        let audioChunks = [];

        // Initialize Peer with a 4-digit ID
        function initPeer() {
            // Generate a random 4-digit ID
            const shortId = Math.floor(1000 + Math.random() * 9000).toString();
            
            // We use a prefix to avoid collisions with other PeerJS users
            const fullId = "apple-p2p-" + shortId;
            
            peer = new Peer(fullId);

            peer.on('open', (id) => {
                myId = shortId;
                document.getElementById('display-id').innerText = myId;
                generateQR(myId);
            });

            peer.on('connection', (c) => {
                if (conn) conn.close();
                conn = c;
                setupChat();
            });

            peer.on('error', (err) => {
                if (err.type === 'unavailable-id') {
                    initPeer(); // Try again if ID taken
                } else {
                    alert("Erro: " + err.type);
                }
            });
        }

        function generateQR(text) {
            const qr = qrcode(0, 'M');
            qr.addData(text);
            qr.make();
            document.getElementById('qrcode').innerHTML = qr.createImgTag(5);
        }

        function copyID() {
            navigator.clipboard.writeText(myId);
            const box = document.getElementById('display-id');
            const original = box.innerText;
            box.innerText = "COPIADO";
            setTimeout(() => box.innerText = original, 1000);
        }

        function connectToPeer() {
            const targetId = document.getElementById('peer-id-input').value;
            if (!targetId || targetId.length !== 4) {
                alert("Insira um código de 4 dígitos válido.");
                return;
            }
            
            conn = peer.connect("apple-p2p-" + targetId);
            setupChat();
        }

        function setupChat() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            
            conn.on('open', () => {
                document.getElementById('chat-with').innerText = "Amigo (" + conn.peer.replace('apple-p2p-', '') + ")";
                addMessage("Sistema", "Conexão segura estabelecida.", "them");
            });

            conn.on('data', (data) => {
                handleIncomingData(data);
            });

            conn.on('close', () => {
                alert("Conexão encerrada.");
                location.reload();
            });
        }

        function handleIncomingData(data) {
            if (data.type === 'text') {
                addMessage("Amigo", data.content, "them");
            } else if (data.type === 'file') {
                const blob = new Blob([data.payload], { type: data.mime });
                const url = URL.createObjectURL(blob);
                
                if (data.mime.startsWith('image/')) {
                    addMessage("Amigo", `<img src="${url}" onclick="window.open('${url}')">`, "them");
                } else if (data.mime.startsWith('video/')) {
                    addMessage("Amigo", `<video controls src="${url}"></video>`, "them");
                } else if (data.mime.startsWith('audio/')) {
                    addMessage("Amigo", `<audio controls src="${url}"></audio>`, "them");
                } else {
                    addMessage("Amigo", `<a href="${url}" download="${data.name}" class="file-link"><i class="fas fa-file"></i> ${data.name}</a>`, "them");
                }
            }
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !conn) return;

            conn.send({ type: 'text', content: text });
            addMessage("Eu", text, "me");
            input.value = "";
        }

        function sendFile() {
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (!file || !conn) return;

            const reader = new FileReader();
            reader.onload = () => {
                conn.send({
                    type: 'file',
                    name: file.name,
                    mime: file.type,
                    payload: reader.result
                });

                const url = URL.createObjectURL(file);
                if (file.type.startsWith('image/')) {
                    addMessage("Eu", `<img src="${url}">`, "me");
                } else {
                    addMessage("Eu", `<i class="fas fa-file"></i> ${file.name}`, "me");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function addMessage(sender, content, type) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${type}`;
            msgDiv.innerHTML = content;
            document.getElementById('messages').appendChild(msgDiv);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        // Voice Recording Logic
        const voiceBtn = document.getElementById('voice-btn');
        const recordingUI = document.getElementById('recording-ui');

        voiceBtn.onmousedown = async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/ogg; codecs=opus' });
                    const reader = new FileReader();
                    reader.onload = () => {
                        conn.send({
                            type: 'file',
                            name: 'audio_message.ogg',
                            mime: 'audio/ogg',
                            payload: reader.result
                        });
                        const url = URL.createObjectURL(blob);
                        addMessage("Eu", `<audio controls src="${url}"></audio>`, "me");
                    };
                    reader.readAsArrayBuffer(blob);
                };

                mediaRecorder.start();
                recordingUI.style.display = 'flex';
            } catch (err) {
                alert("Erro ao acessar microfone: " + err);
            }
        };

        voiceBtn.onmouseup = () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordingUI.style.display = 'none';
            }
        };

        // Handle Enter key
        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Start the app
        initPeer();
    </script>
</body>
</html>
