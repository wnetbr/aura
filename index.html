<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChat Ultra - Scanner P2P</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #F2F2F7; }
        * { box-sizing: border-box; margin: 0; font-family: -apple-system, sans-serif; }
        body { background: #000; height: 100vh; display: flex; justify-content: center; align-items: center; }

        .iphone { width: 100%; max-width: 414px; height: 92vh; background: var(--ios-bg); border-radius: 40px; display: flex; flex-direction: column; overflow: hidden; position: relative; border: 6px solid #333; }

        /* Tela de Entrada */
        #setup-screen { position: absolute; inset: 0; background: #fff; z-index: 100; padding: 30px; display: flex; flex-direction: column; align-items: center; transition: 0.5s; overflow-y: auto; }
        .qr-container { background: #fff; padding: 20px; border-radius: 25px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); margin: 20px 0; }
        #reader { width: 100%; max-width: 250px; border-radius: 15px; overflow: hidden; display: none; }
        
        .btn-main { background: var(--ios-blue); color: #fff; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: 600; margin: 10px 0; cursor: pointer; font-size: 16px; }
        .btn-secondary { background: #E9E9EB; color: #000; border: none; padding: 12px; width: 100%; border-radius: 14px; cursor: pointer; }

        /* Chat */
        #chat-area { flex: 1; display: flex; flex-direction: column; visibility: hidden; }
        header { padding: 45px 20px 15px; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px); border-bottom: 0.5px solid #ccc; text-align: center; }
        #msg-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .bubble { max-width: 75%; padding: 10px 15px; border-radius: 20px; font-size: 16px; position: relative; animation: slide 0.2s ease-out; }
        .me { align-self: flex-end; background: var(--ios-blue); color: #fff; border-bottom-right-radius: 4px; }
        .them { align-self: flex-start; background: #E9E9EB; color: #000; border-bottom-left-radius: 4px; }

        .toolbar { padding: 15px; display: flex; align-items: center; gap: 10px; background: #fff; border-top: 0.5px solid #ccc; }
        .input-box { flex: 1; background: #F2F2F7; border-radius: 20px; padding: 8px 15px; display: flex; border: 0.5px solid #ccc; }
        input { border: none; background: none; flex: 1; outline: none; font-size: 16px; }
        
        @keyframes slide { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="iphone">
    <div id="setup-screen">
        <h2 style="margin-top:20px">Pareamento iChat</h2>
        <div class="qr-container" id="my-qr"></div>
        <div style="font-size: 28px; font-weight: 700; color: var(--ios-blue);" id="my-id-text">---</div>
        
        <div id="reader"></div> <div style="width: 100%; margin-top: 20px;">
            <button class="btn-main" id="scan-btn" onclick="startScanner()">📷 Escanear QR Code</button>
            <input type="number" id="manual-id" placeholder="Ou digite o ID" style="width:100%; padding:15px; border-radius:12px; border:1px solid #ddd; margin-bottom:10px; text-align:center">
            <button class="btn-secondary" onclick="connectDirect()">Conectar Manualmente</button>
        </div>
    </div>

    <div id="chat-area">
        <header><b id="peer-id-display">Chat P2P</b></header>
        <div id="msg-list"></div>
        <div class="toolbar">
            <button onclick="document.getElementById('file-in').click()" style="font-size:24px; background:none; border:none; color:var(--ios-blue)">⊕</button>
            <input type="file" id="file-in" hidden onchange="sendFile(this.files[0])">
            <div class="input-box">
                <input type="text" id="chat-input" placeholder="iMessage">
                <button onclick="sendText()" style="background:none; border:none; color:var(--ios-blue); font-weight:700">↑</button>
            </div>
        </div>
    </div>
</div>

<script>
    let peer, conn, html5QrCode;
    const myId = Math.floor(100 + Math.random() * 900).toString();
    
    // Inicializa PeerJS com Servidores Google
    peer = new Peer(myId, {
        config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
    });

    peer.on('open', id => {
        document.getElementById('my-id-text').innerText = id;
        new QRCode(document.getElementById("my-qr"), { text: id, width: 150, height: 150 });
    });

    // Receber conexão
    peer.on('connection', c => {
        conn = c;
        setupChat();
    });

    // Iniciar Scanner de Câmera
    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('scan-btn').style.display = 'none';
        
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 200, height: 200 } },
            (decodedText) => {
                document.getElementById('manual-id').value = decodedText;
                stopScanner();
                connectDirect();
            }
        ).catch(err => alert("Erro na câmera: " + err));
    }

    function stopScanner() {
        if(html5QrCode) {
            html5QrCode.stop().then(() => {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('scan-btn').style.display = 'block';
            });
        }
    }

    function connectDirect() {
        const target = document.getElementById('manual-id').value;
        if(!target) return alert("ID inválido");
        conn = peer.connect(target);
        setupChat();
    }

    function setupChat() {
        conn.on('open', () => {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('chat-area').style.visibility = 'visible';
            document.getElementById('peer-id-display').innerText = "Conectado: " + conn.peer;
        });

        conn.on('data', data => renderMessage(data, 'them'));
    }

    function sendText() {
        const msg = document.getElementById('chat-input').value;
        if(!msg || !conn) return;
        const data = { type: 'text', content: msg };
        conn.send(data);
        renderMessage(data, 'me');
        document.getElementById('chat-input').value = "";
    }

    function sendFile(file) {
        if(!file || !conn) return;
        const reader = new FileReader();
        reader.onload = e => {
            const data = { type: 'file', content: e.target.result, name: file.name };
            conn.send(data);
            renderMessage(data, 'me');
        };
        reader.readAsDataURL(file);
    }

    function renderMessage(data, side) {
        const div = document.createElement('div');
        div.className = `bubble ${side}`;
        
        if(data.type === 'text') div.innerText = data.content;
        else if(data.type === 'file') {
            if(data.content.startsWith('data:image')) {
                div.innerHTML = `<img src="${data.content}" style="width:100%; border-radius:10px">`;
            } else {
                div.innerHTML = `<a href="${data.content}" download="${data.name}" style="color:inherit; text-decoration:none">📁 ${data.name}</a>`;
            }
        }
        
        document.getElementById('msg-list').appendChild(div);
        document.getElementById('msg-list').scrollTop = document.getElementById('msg-list').scrollHeight;
    }

    // Atalho Enter
    document.getElementById('chat-input').addEventListener('keypress', e => {
        if(e.key === 'Enter') sendText();
    });
</script>

</body>
</html>
