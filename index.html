<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChat P2P - Apple Style</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --apple-bg: rgba(255, 255, 255, 0.8);
            --apple-blue: #007AFF;
            --glass: blur(25px);
            --system-font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--system-font); }

        body {
            background: linear-gradient(150deg, #d2d2d7 0%, #ffffff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            height: 95vh;
            background: var(--apple-bg);
            backdrop-filter: var(--glass);
            border-radius: 40px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0,0,0,0.12);
            border: 1px solid rgba(255,255,255,0.4);
            position: relative;
        }

        /* Tela de Conexão (QR Code) */
        #connection-screen {
            position: absolute;
            inset: 0;
            background: white;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            border-radius: 40px;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #qrcode { margin: 25px 0; padding: 15px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .btn-connect {
            background: var(--apple-blue);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        input.peer-input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 10px;
            text-align: center;
        }

        /* Header */
        header { padding: 30px 25px 15px; display: flex; align-items: center; gap: 15px; }
        .avatar { width: 42px; height: 42px; background: #E9E9EB; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }

        /* Chat */
        #chat-window {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            word-wrap: break-word;
        }

        .sent { align-self: flex-end; background: var(--apple-blue); color: white; border-bottom-right-radius: 5px; }
        .received { align-self: flex-start; background: #E9E9EB; color: black; border-bottom-left-radius: 5px; }

        /* Input Area */
        .input-bar {
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.6);
        }

        .text-box {
            flex: 1;
            background: white;
            border-radius: 22px;
            padding: 10px 15px;
            border: 1px solid rgba(0,0,0,0.1);
            outline: none;
        }

        .file-btn { font-size: 24px; color: var(--apple-blue); cursor: pointer; border: none; background: none; }
        
        img.preview { max-width: 100%; border-radius: 12px; margin-top: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="connection-screen">
        <h2 style="font-weight: 700;">Conectar Dispositivo</h2>
        <p style="color: #8e8e93; font-size: 14px; margin-top: 8px;">Escaneie o QR Code ou digite o ID para parear</p>
        
        <div id="qrcode"></div>
        <p id="my-id-display" style="font-weight: 600; font-size: 12px; background: #f2f2f7; padding: 5px 15px; border-radius: 20px;"></p>

        <div style="width: 100%; border-top: 1px solid #eee; margin-top: 25px; padding-top: 20px;">
            <input type="text" id="remote-id" class="peer-input" placeholder="ID do outro dispositivo">
            <button class="btn-connect" onclick="connectToPeer()">Conectar Agora</button>
        </div>
    </div>

    <header>
        <div class="avatar" id="peer-avatar">?</div>
        <div>
            <h4 id="status-text">Aguardando conexão...</h4>
            <span style="font-size: 12px; color: #4cd964;">● P2P Seguro Ativo</span>
        </div>
    </header>

    <div id="chat-window"></div>

    <div class="input-bar">
        <button class="file-btn" onclick="document.getElementById('file-input').click()">+</button>
        <input type="file" id="file-input" class="hidden" onchange="sendFile(this.files[0])">
        <input type="text" id="msg-input" class="text-box" placeholder="iMessage" onkeypress="if(event.key==='Enter') sendText()">
        <button class="file-btn" style="transform: rotate(-45deg)" onclick="sendText()">▲</button>
    </div>
</div>

<script>
    let peer;
    let conn;
    const myIdDisplay = document.getElementById('my-id-display');
    const chatWindow = document.getElementById('chat-window');
    const msgInput = document.getElementById('msg-input');

    // Inicializar PeerJS
    peer = new Peer();

    peer.on('open', (id) => {
        myIdDisplay.innerText = "Seu ID: " + id;
        new QRCode(document.getElementById("qrcode"), {
            text: id,
            width: 180,
            height: 180
        });
    });

    // Escutar por conexões recebidas
    peer.on('connection', (connection) => {
        setupConnection(connection);
    });

    function connectToPeer() {
        const remoteId = document.getElementById('remote-id').value;
        if (!remoteId) return alert("Digite um ID");
        const connection = peer.connect(remoteId);
        setupConnection(connection);
    }

    function setupConnection(connection) {
        conn = connection;
        
        conn.on('open', () => {
            document.getElementById('connection-screen').style.transform = 'translateY(-100%)';
            document.getElementById('status-text').innerText = "Conectado";
            addMessage("Sistema", "Conexão estabelecida com sucesso!", "received");
        });

        conn.on('data', (data) => {
            if (data.type === 'text') {
                addMessage("Outro", data.content, "received");
            } else if (data.type === 'file') {
                const blob = new Blob([data.file], { type: data.fileType });
                const url = URL.createObjectURL(blob);
                if (data.fileType.startsWith('image/')) {
                    addMessage("Outro", `<img src="${url}" class="preview"><br>${data.fileName}`, "received");
                } else {
                    addMessage("Outro", `<a href="${url}" download="${data.fileName}" style="color:inherit">📁 Arquivo: ${data.fileName}</a>`, "received");
                }
            }
        });
    }

    function sendText() {
        const text = msgInput.value;
        if (!text || !conn) return;
        conn.send({ type: 'text', content: text });
        addMessage("Você", text, "sent");
        msgInput.value = "";
    }

    function sendFile(file) {
        if (!file || !conn) return;
        
        conn.send({
            type: 'file',
            file: file,
            fileType: file.type,
            fileName: file.name
        });

        if (file.type.startsWith('image/')) {
            const url = URL.createObjectURL(file);
            addMessage("Você", `<img src="${url}" class="preview"><br>${file.name}`, "sent");
        } else {
            addMessage("Você", `📁 Arquivo enviado: ${file.name}`, "sent");
        }
    }

    function addMessage(user, content, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerHTML = content;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }
</script>

</body>
</html>
